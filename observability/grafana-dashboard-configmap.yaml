apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudmaven-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cloudmaven-api.json: |
    {
      "title": "CloudMaven API Overview",
      "schemaVersion": 39,
      "panels": [
        {
          "title": "API Request Count",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(rate(cloudmaven_api_requests_total[5m])) by (route, status_code)" }
          ]
        },
        {
          "title": "API p95 Latency",
          "type": "timeseries",
          "targets": [
            { "expr": "histogram_quantile(0.95, sum(rate(cloudmaven_api_request_duration_seconds_bucket[5m])) by (le, route))" }
          ]
        },
        {
          "title": "Pod CPU",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"cloudmaven\",container!=\"\"}[5m])) by (pod)" }
          ]
        },
        {
          "title": "Pod Memory",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(container_memory_working_set_bytes{namespace=\"cloudmaven\",container!=\"\"}) by (pod)" }
          ]
        }
      ]
    }

