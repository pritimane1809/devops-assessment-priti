name: CloudMaven CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  #AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_REGION: ap-south-1
  #ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REGISTRY: 420107697750.dkr.ecr.ap-south-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  ci:
    name: CI - Validate and Build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: infrastructure/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infrastructure/terraform
        run: terraform validate

      - name: Docker build backend
        run: docker build -t cloudmaven-backend:test apps/backend

      - name: Docker build frontend
        run: docker build -t cloudmaven-frontend:test apps/frontend

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/cloudmaven-app

      - name: Render Kubernetes manifests
        run: helm template cloudmaven-app helm/cloudmaven-app > rendered-manifests.yaml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: rendered-manifests.yaml

  cd:
    name: CD - Provision and Deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudmaven/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        working-directory: infrastructure/terraform
        run: terraform plan -out tfplan

      - name: Terraform apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build -t $ECR_REGISTRY/cloudmaven-dev-backend:$IMAGE_TAG apps/backend
          docker push $ECR_REGISTRY/cloudmaven-dev-backend:$IMAGE_TAG

      - name: Build and push frontend
        run: |
          docker build -t $ECR_REGISTRY/cloudmaven-dev-frontend:$IMAGE_TAG apps/frontend
          docker push $ECR_REGISTRY/cloudmaven-dev-frontend:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
         aws eks update-kubeconfig \
         --region $AWS_REGION \
         --name cloudmaven-dev-eks

      - name: Verify cluster access
        run: |
         kubectl get nodes
         kubectl get ns

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy application
        run: |
          helm upgrade --install cloudmaven-app helm/cloudmaven-app \
            --namespace cloudmaven --create-namespace \
            --set imageRegistry=$ECR_REGISTRY \
            --set frontend.image=cloudmaven-dev-frontend \
            --set backend.image=cloudmaven-dev-backend \
            --set imageTag=$IMAGE_TAG \
            --set ingress.host=${{ secrets.APP_HOST }}

      - name: Rollout verification
        run: |
          kubectl rollout status deployment/cloudmaven-app-cloudmaven-app-frontend -n cloudmaven --timeout=180s
          kubectl rollout status deployment/cloudmaven-app-cloudmaven-app-backend -n cloudmaven --timeout=180s

      - name: Smoke test API
        run: curl -fsS "http://${{ secrets.APP_HOST }}/api"
