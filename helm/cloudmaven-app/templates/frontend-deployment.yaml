apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudmaven.fullname" . }}-frontend
  labels:
    app.kubernetes.io/component: frontend
    app.kubernetes.io/name: {{ include "cloudmaven.name" . }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
      app.kubernetes.io/name: {{ include "cloudmaven.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
        app.kubernetes.io/name: {{ include "cloudmaven.name" . }}
    spec:
      containers:
        - name: frontend
          image: {{ include "cloudmaven.image" (dict "registry" .Values.imageRegistry "image" .Values.frontend.image "tag" .Values.imageTag) }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
          envFrom:
            - configMapRef:
                name: {{ include "cloudmaven.fullname" . }}-config
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

