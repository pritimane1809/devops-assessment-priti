apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudmaven.fullname" . }}-backend
  labels:
    app.kubernetes.io/component: backend
    app.kubernetes.io/name: {{ include "cloudmaven.name" . }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      app.kubernetes.io/name: {{ include "cloudmaven.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        app.kubernetes.io/name: {{ include "cloudmaven.name" . }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.backend.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: {{ include "cloudmaven.image" (dict "registry" .Values.imageRegistry "image" .Values.backend.image "tag" .Values.imageTag) }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
          envFrom:
            - configMapRef:
                name: {{ include "cloudmaven.fullname" . }}-config
            - secretRef:
                name: {{ include "cloudmaven.fullname" . }}-secret
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

