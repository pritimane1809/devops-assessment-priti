apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudmaven.fullname" . }}-backend
  labels:
    app.kubernetes.io/component: backend
    app.kubernetes.io/name: {{ include "cloudmaven.name" . }}
spec:
  selector:
    app.kubernetes.io/component: backend
    app.kubernetes.io/name: {{ include "cloudmaven.name" . }}
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: http

