imageRegistry: 420107697750.dkr.ecr.ap-south-1.amazonaws.com
imageTag: latest

frontend:
  replicaCount: 2
  image: cloudmaven-dev-frontend
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

backend:
  replicaCount: 2
  image: cloudmaven-dev-backend
  port: 3000
  secretToken: change-me
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  host: cloudmaven.local

cronjob:
  enabled: true
  schedule: "*/5 * * * *"
